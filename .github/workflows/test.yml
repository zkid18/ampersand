name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        # The CLI depends on amperstand-core, which isn't on PyPI yet — pull
        # it directly from the GitHub repo so CI can resolve the dep.
        run: |
          python -m pip install --upgrade pip
          pip install "amperstand-core @ git+https://github.com/zkid18/ampersand-core.git@main"
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest -q --tb=short || \
            (echo "(no tests yet — exit clean)" && [ "$?" -eq 5 ])
